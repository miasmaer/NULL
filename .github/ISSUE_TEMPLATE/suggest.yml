name:  Feature request
description: Suggest a new capability, protocol, or improvement.
title: " "
labels: ["enhancement"]
body:
  - type: markdown
    attributes:
      value: |
        Have an idea to make NULL better? Fill out requires boxes so I take a look.

  - type: textarea
    id: suggestion
    attributes:
      label: Proposed solution
      description: What would you like to see added or changed?
      placeholder: e.g. "Adding smth would be so cool, so people could do smth with it"
    validations:
      required: true

  - type: checkboxes
    id: checks
    attributes:
      label: Checklist
      options:
        - label: I searched existing issues and didn't find a duplicate(Your issue will be closed if you won't check that box)
          required: false
