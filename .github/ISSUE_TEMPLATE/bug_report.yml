name:  Bug Report
description: Something crashed, misbehaved, or didn't build correctly.
title: "Required Description "
labels: BUG:
body:
  - type: checkboxes
    id: acknowledgements
    attributes:
      label: Acknowledgement of checking existent issues
      options:
        - label: I have checked that my issue is not already reported or not similar to other reports
          required: true
        - label: I attached all required logs/outputs
          required: true
        - label: I aggre that i am just clicking random buttons just to be in "Issue".
          required: false

  - type: textarea
    id: problem
    attributes:
      label: What problem did you encounter?
      description: |
        Provide a comprehensive description of the problem you're facing, including the exact command you ran, your distro/compiler version, and what you expected to happen instead. Don't forget to attach any additional resources you may have, such as terminal output, screenshots, or a CSV export. **YOUR ISSUE WILL BE CLOSED IF YOU DO NOT PROVIDE OUTPUT/LOGS.** If you captured with `--sf`, attach the generated `NULL_capture_*.csv` file; for build failures, paste the full `make` output.
      placeholder: |
        Command: sudo ./null -i eth0 --https -v
        Distro: Ubuntu 24.04
        Compiler: g++ 13.2.0

        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: dropdown
    id: interface-type
    attributes:
      label: Interface type (if capture/parsing related)
      options:
        - Not applicable
        - Wired Ethernet
        - Wi-Fi (managed mode)
        - Wi-Fi (monitor mode)
        - VPN / tunnel interface
        - Container / bridge interface
        - Other (describe above)
    validations:
      required: false
